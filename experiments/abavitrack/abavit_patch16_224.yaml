DATA:
  MAX_SAMPLE_INTERVAL: 100
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SEARCH:
    CENTER_JITTER: 2.5
    FACTOR: 4.0
    SCALE_JITTER: 0.4
    SIZE: 256
    NUMBER: 1
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128

  TRAIN:
    DATASETS_NAME:
    - MTC_AIC4
#    - LASOT
#    - GOT10K_vottrain
#    - COCO17
#    - TRACKINGNET
    DATASETS_RATIO:
#    - 1
#    - 1
#    - 1
    - 1
    SAMPLE_PER_EPOCH: 10000
  VAL:
    DATASETS_NAME:
#    - GOT10K_votval
    - MTC_AIC4
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 20_000

#  SAVE_EVERY_EPOCH: True


MODEL:
  PRETRAIN_FILE: "checkpoints/AbaViTrack_ep0010.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: abavit_patch16_224
    STRIDE: 16
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 24  # 16 or 32 at most
  EPOCH: 25
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.00001
  LR_DROP_EPOCH: 10 # Drop the LR near the end
  NUM_WORKER: 16
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 5 # Evaluate and save a checkpoint every 5 epochs
  WEIGHT_DECAY: 0.0001
  AMP: True
TEST:
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
